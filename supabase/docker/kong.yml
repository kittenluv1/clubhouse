_format_version: "2.1"

services:
  - name: auth-v1
    host: auth
    port: 9999
    protocol: http
    routes:
      - name: auth-v1-all
        strip_path: true
        paths:
          - /auth/v1
    plugins:
      - name: cors
        config:
          origins:
            - "http://localhost:3000"
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          headers:
            - Accept
            - Authorization
            - Content-Type
            - apikey
            - X-Client-Info
            - X-Supabase-Api-Version
          credentials: true
          max_age: 3600

  - name: rest-v1
    host: rest
    port: 3000
    protocol: http
    routes:
      - name: rest-v1-all
        strip_path: true
        paths:
          - /rest/v1
    plugins:
      - name: cors
        config:
          origins:
            - "http://localhost:3000"
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          headers:
            - Accept
            - Authorization
            - Content-Type
            - apikey
            - Prefer
            - Range
            - X-Client-Info
            - X-Supabase-Api-Version
          exposed_headers:
            - Content-Range
          credentials: true
          max_age: 3600
